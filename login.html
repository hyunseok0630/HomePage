<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인 | SKY Commerce</title>
    <link rel="icon" type="image/png" sizes="any" href="img/logo_blue.png">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .login-section {
            padding: 160px 0 100px;
            background: var(--bg-color);
            min-height: calc(100vh - 250px);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-container {
            background: var(--surface-color);
            padding: 50px 40px;
            border-radius: 20px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.04);
            width: 100%;
            max-width: 450px;
            text-align: center;
        }
        .login-title {
            margin-bottom: 30px;
            color: var(--text-main);
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.03em;
        }
        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: var(--text-muted);
            font-weight: 500;
        }
        .form-control {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid #d2d2d7;
            border-radius: 10px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.3s;
            font-family: inherit;
        }
        .form-control:focus {
            border-color: var(--accent-blue);
        }
        .login-btn {
            width: 100%;
            padding: 16px;
            background: var(--text-main);
            color: #fff;
            border: none;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 10px;
            font-family: inherit;
        }
        .login-btn:hover {
            background: #000;
        }
        #errorMessage {
            color: #e74a3b;
            font-size: 14px;
            margin-top: 15px;
            display: none;
        }
    </style>
</head>
<body>
    <header id="main-header" class="scrolled"> 
        <div class="header-inner">
            <div class="header-left logo"><a href="index.html"><img src="img/main.jpg" alt="SKY Commerce"></a></div>
            <nav class="header-center">
                <ul class="nav-menu">
                    <li><a href="index.html">홈</a></li>
                    <li><a href="about.html">회사 소개</a></li>
                    <li><a href="product.html">제품</a></li>
                    <li><a href="contact.html">문의하기</a></li>
                </ul>
            </nav>
            <div class="header-right utility-icons">
                <a href="#"><i class="fas fa-globe"></i></a>
                <a href="#"><i class="fas fa-search"></i></a>
                <a href="login.html" id="userProfileBtn" style="color: #0071e3;"><i class="fas fa-user"></i></a>
                <a href="#"><i class="fas fa-shopping-cart"></i></a>
            </div>
        </div>
    </header>

    <section class="login-section">
        <div class="login-container">
            <h2 class="login-title">관리자 로그인</h2>
            <form id="loginForm">
                <div class="form-group">
                    <label for="username">아이디</label>
                    <input type="text" id="username" class="form-control" placeholder="아이디를 입력하세요" required>
                </div>
                <div class="form-group">
                    <label for="password">비밀번호</label>
                    <input type="password" id="password" class="form-control" placeholder="비밀번호를 입력하세요" required>
                </div>
                <button type="submit" class="login-btn">로그인</button>
                <p id="errorMessage">아이디 또는 비밀번호가 일치하지 않습니다.</p>
            </form>
        </div>
    </section>

    <footer>
        <div class="container">
            <div class="footer-content">
                <div class="footer-logo">
                    <h3>SKY COMMERCE</h3>
                    <p>미래를 일상으로.</p>
                </div>
                <div class="footer-links">
                    <h4>메뉴</h4>
                    <ul>
                        <li><a href="index.html">홈</a></li>
                        <li><a href="about.html">회사 소개</a></li>
                        <li><a href="product.html">제품</a></li>
                        <li><a href="contact.html">문의하기</a></li>
                    </ul>
                </div>
                <div class="footer-contact">
                    <h4>고객지원</h4>
                    <p>031-205-4133</p>
                    <p>car2314@naver.com</p>
                    <p class="address">경기도 화성시 동탄대로 677-12<br>620 ~ 621호</p>
                </div>
                <div class="footer-social">
                    <h4>커뮤니티</h4>
                    <div class="social-icons">
                        <a href="https://cafe.naver.com/skycommerce114" target="_blank"><i class="fas fa-coffee"></i></a>
                        <a href="https://smartstore.naver.com/nxtwear" target="_blank"><i class="fas fa-shopping-cart"></i></a>
                    </div>
                </div>
            </div>
            <div class="footer-bottom"><p>&copy; 2025 SKY Commerce. All Rights Reserved.</p></div>
        </div>
    </footer>

    <script src="js/main.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            // 고객님께서 요청하신 아이디와 비밀번호로 변경되었습니다.
            if (username === 'yhs2085' && password === '1234') {
                localStorage.setItem('isLoggedIn', 'true');
                localStorage.setItem('userRole', 'admin');
                alert('관리자 계정으로 로그인되었습니다.');
                window.location.href = 'index.html'; // 로그인 성공 시 메인페이지로 이동
            } else {
                document.getElementById('errorMessage').style.display = 'block';
            }
        });
    </script>
</body>
</html>
