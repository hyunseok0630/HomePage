        .login-section {

            justify-content: center;

            box-shadow: 0 4px 24px rgba(0,0,0,0.04);

        .login-title {

            color: var(--text-main);
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.03em;
        }
        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: var(--text-muted);
            font-weight: 500;
        }
        .form-control {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid #d2d2d7;
            border-radius: 10px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.3s;
            font-family: inherit;
        }
        .form-control:focus {
            border-color: var(--accent-blue);
        }
        .login-btn {
            width: 100%;
            padding: 16px;
            background: var(--text-main);
            color: #fff;
            border: none;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 10px;
            font-family: inherit;
        }
        .login-btn:hover {
            background: #000;
        }
        #errorMessage {
            color: #e74a3b;
            font-size: 14px;
            margin-top: 15px;
            display: none;
        }

</head>

    <!-- 기존 <script src="js/main.js"> 아래에 추가 -->
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged }
        from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCCs0WBQeHiIoJWjbc7IP8GGb7knc9yfJw",
        authDomain: "skycommerce-7fec4.firebaseapp.com",
        projectId: "skycommerce-7fec4",
        storageBucket: "skycommerce-7fec4.firebasestorage.app",
        messagingSenderId: "232403511014",
        appId: "1:232403511014:web:318ebb689d678e998b7d27"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    // 이미 로그인된 상태면 바로 이동
    onAuthStateChanged(auth, (user) => {
        if (user) window.location.href = 'index.html';
    });

    document.getElementById('loginForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const email = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value;
        const errMsg = document.getElementById('errorMessage');

        try {
            await signInWithEmailAndPassword(auth, email, password);
            // main.js의 localStorage 체크와의 호환성 유지
            localStorage.setItem('isLoggedIn', 'true');
            localStorage.setItem('userRole', 'admin');
            window.location.href = 'index.html';
        } catch (err) {
            errMsg.style.display = 'block';
            errMsg.textContent = '이메일 또는 비밀번호가 일치하지 않습니다.';
        }
    });
</script>
