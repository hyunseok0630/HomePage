<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>관리자 페이지 | SKY Commerce</title>
    <link rel="icon" type="image/png" sizes="any" href="../img/logo_blue.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
    <style>
        body { background: #f5f5f7; padding-top: 80px; }
        .admin-wrap { max-width: 900px; margin: 0 auto; padding: 40px 20px; }
        .admin-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .admin-header h1 { font-size: 28px; font-weight: 700; letter-spacing: -0.03em; }
        .admin-actions { display: flex; gap: 10px; }
        .btn-danger { background: crimson; color: #fff; border: none; border-radius: 8px; padding: 10px 18px; font-size: 13px; font-weight: 600; font-family: inherit; cursor: pointer; transition: background 0.2s; }
        .btn-danger:hover { background: #a00; }
        .btn-logout { background: #1d1d1f; color: #fff; border: none; border-radius: 8px; padding: 10px 18px; font-size: 13px; font-weight: 600; font-family: inherit; cursor: pointer; transition: background 0.2s; }
        .btn-logout:hover { background: #000; }

        .tab-bar { display: flex; gap: 8px; margin-bottom: 24px; }
        .tab-btn { background: #fff; border: 1.5px solid #ddd; border-radius: 20px; padding: 8px 18px; font-size: 13px; font-weight: 500; font-family: inherit; cursor: pointer; transition: all 0.2s; }
        .tab-btn.active { background: #1d1d1f; color: #fff; border-color: #1d1d1f; }

        .inquiry-card { background: #fff; border-radius: 14px; padding: 22px 24px; margin-bottom: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.05); border-left: 4px solid #ddd; }
        .inquiry-card.unread { border-left-color: #0071e3; background: #f0f7ff; }
        .inquiry-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .inquiry-name { font-size: 16px; font-weight: 700; color: #1d1d1f; }
        .inquiry-date { font-size: 12px; color: #aaa; }
        .inquiry-type { display: inline-block; background: #f5f5f7; color: #555; font-size: 11px; padding: 3px 10px; border-radius: 10px; margin-bottom: 8px; }
        .inquiry-msg { font-size: 14px; color: #444; line-height: 1.7; white-space: pre-wrap; margin-bottom: 10px; }
        .inquiry-contact { font-size: 12px; color: #888; margin-bottom: 12px; }
        .inquiry-btns { display: flex; gap: 8px; }
        .btn-read { background: #e8f4ff; color: #0071e3; border: none; border-radius: 6px; padding: 6px 14px; font-size: 12px; font-weight: 500; cursor: pointer; font-family: inherit; }
        .btn-del  { background: #fff0f0; color: crimson; border: none; border-radius: 6px; padding: 6px 14px; font-size: 12px; font-weight: 500; cursor: pointer; font-family: inherit; }
        .empty-msg { text-align: center; padding: 80px 0; color: #bbb; font-size: 16px; }

        .stats-bar { display: flex; gap: 16px; margin-bottom: 24px; flex-wrap: wrap; }
        .stat-box { background: #fff; border-radius: 12px; padding: 16px 24px; box-shadow: 0 2px 12px rgba(0,0,0,0.05); flex: 1; min-width: 120px; text-align: center; }
        .stat-box .num   { font-size: 28px; font-weight: 700; color: #1d1d1f; }
        .stat-box .label { font-size: 12px; color: #aaa; margin-top: 4px; }
        .stat-box.blue .num { color: #0071e3; }

        #authBlock { display: flex; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #f5f5f7; z-index: 9999; align-items: center; justify-content: center; flex-direction: column; gap: 12px; }
        #authBlock p { font-size: 16px; color: #888; }

        @media (max-width: 600px) {
            .admin-header { flex-direction: column; align-items: flex-start; gap: 12px; }
        }
    </style>
</head>
<body>

    <div id="authBlock">
        <i class="fas fa-lock" style="font-size:32px; color:#ccc;"></i>
        <p>접근 권한 확인 중...</p>
    </div>

    <header id="main-header">
        <div class="header-inner">
            <div class="header-left logo">
                <a href="../"><img src="../img/main.jpg" alt="SKY Commerce"></a>
            </div>
            <nav class="header-center">
                <ul class="nav-menu">
                    <li><a href="../">홈</a></li>
                    <li><a href="../product/">제품 관리</a></li>
                    <li><a href="../contact/">문의 확인</a></li>
                </ul>
            </nav>
            <div class="header-right utility-icons">
                <a href="../product/"><i class="fas fa-box"></i></a>
                <a href="#" id="logoutBtn"><i class="fas fa-sign-out-alt"></i></a>
                <button class="hamburger" id="hamburger" aria-label="메뉴">
                    <span></span><span></span><span></span>
                </button>
            </div>
        </div>
    </header>

    <nav class="mobile-menu" id="mobileMenu">
        <ul>
            <li><a href="../">홈</a></li>
            <li><a href="../product/">제품 관리</a></li>
            <li><a href="../contact/">문의 확인</a></li>
        </ul>
    </nav>

    <div class="admin-wrap">
        <div class="admin-header">
            <h1>📋 문의 관리</h1>
            <div class="admin-actions">
                <button class="btn-danger" onclick="deleteAllRead()">읽은 문의 전체 삭제</button>
                <button class="btn-logout" onclick="handleLogout()">로그아웃</button>
            </div>
        </div>

        <div class="stats-bar">
            <div class="stat-box blue">
                <div class="num" id="statUnread">-</div>
                <div class="label">미확인</div>
            </div>
            <div class="stat-box">
                <div class="num" id="statTotal">-</div>
                <div class="label">전체</div>
            </div>
            <div class="stat-box">
                <div class="num" id="statRead">-</div>
                <div class="label">확인됨</div>
            </div>
        </div>

        <div class="tab-bar">
            <button class="tab-btn active" onclick="filterList('all', this)">전체</button>
            <button class="tab-btn"        onclick="filterList('unread', this)">미확인</button>
            <button class="tab-btn"        onclick="filterList('read', this)">확인됨</button>
        </div>

        <div id="inquiryList"></div>
    </div>

    <script src="../js/main.js"></script>
    <script type="module">
        import { initializeApp, getApps, getApp }
            from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, getDocs, deleteDoc,
                 doc, getDoc, updateDoc, query, orderBy, writeBatch }
            from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged, signOut }
            from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { firebaseConfig } from "../js/firebase-init.js"; // ✅ 중앙화된 config

        const app  = getApps().length ? getApp() : initializeApp(firebaseConfig);
        const db   = getFirestore(app);
        const auth = getAuth(app);

        let allInquiries  = [];
        let currentFilter = 'all';

        // ✅ 로그인 + isAdmin 2중 검증
        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                window.location.replace('../login/');
                return;
            }
            try {
                const userDoc = await getDoc(doc(db, "users", user.uid));
                if (!userDoc.exists() || userDoc.data().isAdmin !== true) {
                    alert('관리자 권한이 없습니다.');
                    window.location.replace('../');
                    return;
                }
            } catch (e) {
                alert('권한 확인 실패: ' + e.message);
                window.location.replace('../');
                return;
            }
            document.getElementById('authBlock').style.display = 'none';
            loadInquiries();
        });

        function esc(str = '') {
            return String(str)
                .replace(/&/g,'&amp;').replace(/</g,'&lt;')
                .replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
        }

        async function loadInquiries() {
            try {
                const q = query(collection(db, "inquiries"), orderBy("createdAt", "desc"));
                const snapshot = await getDocs(q);
                allInquiries = [];
                snapshot.forEach(d => allInquiries.push({ id: d.id, ...d.data() }));
                updateStats();
                renderList();
            } catch (e) {
                document.getElementById('inquiryList').innerHTML =
                    '<p class="empty-msg">⚠️ 불러오기 실패: ' + esc(e.message) + '</p>';
            }
        }

        function updateStats() {
            const unread = allInquiries.filter(i => !i.read).length;
            document.getElementById('statTotal').textContent  = allInquiries.length;
            document.getElementById('statUnread').textContent = unread;
            document.getElementById('statRead').textContent   = allInquiries.length - unread;
        }

        function renderList() {
            const list     = document.getElementById('inquiryList');
            const filtered = allInquiries.filter(i => {
                if (currentFilter === 'unread') return !i.read;
                if (currentFilter === 'read')   return i.read;
                return true;
            });

            if (filtered.length === 0) {
                list.innerHTML = '<p class="empty-msg">📭 문의가 없습니다.</p>';
                return;
            }

            list.innerHTML = filtered.map(item => {
                const date = item.createdAt?.toDate
                    ? item.createdAt.toDate().toLocaleString('ko-KR')
                    : '날짜 없음';
                const displayName = item.vendorName || item.name || '(이름 없음)';
                const displayMsg  = item.summary    || item.message || '(내용 없음)';
                const contact     = item.phone
                    ? `📞 ${esc(item.phone)}${item.email ? `　✉️ ${esc(item.email)}` : ''}`
                    : '';
                return `
                <div class="inquiry-card ${item.read ? 'read' : 'unread'}">
                    <div class="inquiry-top">
                        <span class="inquiry-name">${item.read ? '' : '🔵 '}${esc(displayName)}</span>
                        <span class="inquiry-date">${esc(date)}</span>
                    </div>
                    <span class="inquiry-type">${esc(item.type || '발주')}</span>
                    <div class="inquiry-msg">${esc(displayMsg)}</div>
                    ${contact ? `<div class="inquiry-contact">${contact}</div>` : ''}
                    <div class="inquiry-btns">
                        <button class="btn-read" onclick="toggleRead('${esc(item.id)}', ${item.read})">
                            ${item.read ? '미확인으로 변경' : '✔ 확인됨으로 표시'}
                        </button>
                        <button class="btn-del" onclick="deleteOne('${esc(item.id)}')">🗑 삭제</button>
                    </div>
                </div>`;
            }).join('');
        }

        window.filterList = function(filter, btn) {
            currentFilter = filter;
            document.querySelectorAll('.tab-btn').forEach(t => t.classList.remove('active'));
            btn.classList.add('active');
            renderList();
        };

        window.toggleRead = async function(id, currentRead) {
            try {
                await updateDoc(doc(db, "inquiries", id), { read: !currentRead });
                const item = allInquiries.find(i => i.id === id);
                if (item) item.read = !currentRead;
                updateStats();
                renderList();
            } catch (e) { alert('업데이트 실패: ' + e.message); }
        };

        window.deleteOne = async function(id) {
            if (!confirm('이 문의를 삭제하시겠습니까?')) return;
            try {
                await deleteDoc(doc(db, "inquiries", id));
                allInquiries = allInquiries.filter(i => i.id !== id);
                updateStats();
                renderList();
            } catch (e) { alert('삭제 실패: ' + e.message); }
        };

        window.deleteAllRead = async function() {
            const readItems = allInquiries.filter(i => i.read);
            if (readItems.length === 0) { alert('삭제할 읽은 문의가 없습니다.'); return; }
            if (!confirm(`확인된 문의 ${readItems.length}건을 모두 삭제하시겠습니까?`)) return;
            try {
                const batch = writeBatch(db);
                readItems.forEach(i => batch.delete(doc(db, "inquiries", i.id)));
                await batch.commit();
                allInquiries = allInquiries.filter(i => !i.read);
                updateStats();
                renderList();
            } catch (e) { alert('삭제 실패: ' + e.message); }
        };

        window.handleLogout = async function() {
            if (!confirm('로그아웃 하시겠습니까?')) return;
            try {
                await signOut(auth);
                localStorage.removeItem('loginTime');
                localStorage.removeItem('isLoggedIn');
                localStorage.removeItem('userRole');
                window.location.replace('/login/'); // ✅ 절대 경로
            } catch (e) { alert('로그아웃 실패: ' + e.message); }
        };

        document.getElementById('logoutBtn').addEventListener('click', (e) => {
            e.preventDefault();
            handleLogout();
        });
    </script>
</body>
</html>
