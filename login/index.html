<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인 | SKY Commerce</title>
    <link rel="icon" type="image/png" sizes="any" href="../img/logo_blue.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
    <style>
        body { background: #f5f5f7; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding-top: 0; }
        .login-card {
            background: #fff; border-radius: 20px; padding: 50px 44px;
            width: 100%; max-width: 420px;
            box-shadow: 0 8px 40px rgba(0,0,0,0.08);
        }
        .login-logo { text-align: center; margin-bottom: 32px; }
        .login-logo img { height: 40px; border-radius: 6px; }
        .login-logo h2 { font-size: 20px; font-weight: 700; margin-top: 14px; letter-spacing: -0.03em; }
        .login-logo p  { font-size: 13px; color: #888; margin-top: 4px; }

        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 6px; color: #444; }
        .form-group input {
            width: 100%; padding: 13px 14px; border: 1.5px solid #d0d0d7;
            border-radius: 10px; font-size: 14px; font-family: inherit; outline: none;
            transition: border-color 0.2s;
        }
        .form-group input:focus { border-color: var(--accent-blue); }

        .btn-login {
            width: 100%; background: #1d1d1f; color: #fff;
            border: none; border-radius: 10px; padding: 15px;
            font-size: 15px; font-weight: 600; font-family: inherit;
            cursor: pointer; transition: background 0.2s, transform 0.2s; margin-top: 8px;
        }
        .btn-login:hover { background: #000; transform: translateY(-1px); }
        .btn-login:disabled { background: #aaa; cursor: not-allowed; transform: none; }

        .error-msg {
            display: none; background: #fff0f0; border: 1px solid #ffc0c0;
            border-radius: 8px; color: #c00; font-size: 13px;
            padding: 12px 14px; margin-top: 12px; text-align: center;
        }
        .error-msg.show { display: block; }
        .spinner {
            display: inline-block; width: 14px; height: 14px;
            border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff;
            border-radius: 50%; animation: spin 0.7s linear infinite;
            vertical-align: middle; margin-right: 6px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .login-footer { text-align: center; margin-top: 24px; font-size: 12px; color: #aaa; }
        .login-footer a { color: var(--accent-blue); text-decoration: none; }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="login-logo">
            <a href="../"><img src="../img/main.jpg" alt="SKY Commerce"></a>
            <h2>SKY Commerce</h2>
            <p>협력업체 로그인</p>
        </div>

        <div class="form-group">
            <label for="loginEmail">이메일</label>
            <input type="email" id="loginEmail" placeholder="이메일을 입력하세요" autocomplete="email">
        </div>
        <div class="form-group">
            <label for="loginPassword">비밀번호</label>
            <input type="password" id="loginPassword" placeholder="비밀번호를 입력하세요" autocomplete="current-password">
        </div>

        <button class="btn-login" id="loginBtn" onclick="handleLogin()">로그인</button>
        <div class="error-msg" id="errorMsg"></div>

        <div class="login-footer">
            <a href="../">← 홈으로 돌아가기</a>
        </div>
    </div>

    <script type="module">
        import { initializeApp, getApps, getApp }
            from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged }
            from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { firebaseConfig } from "../js/firebase-init.js"; // ✅ 중앙화된 config

        const app  = getApps().length ? getApp() : initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // 이미 로그인된 경우 바로 이동
        onAuthStateChanged(auth, (user) => {
            if (user) window.location.replace('../');
        });

        window.handleLogin = async function () {
            const email    = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;
            const btn      = document.getElementById('loginBtn');
            const err      = document.getElementById('errorMsg');

            if (!email || !password) {
                err.textContent = '이메일과 비밀번호를 입력해주세요.';
                err.classList.add('show');
                return;
            }

            btn.disabled    = true;
            btn.innerHTML   = '<span class="spinner"></span>로그인 중...';
            err.classList.remove('show');

            try {
                await signInWithEmailAndPassword(auth, email, password);
                localStorage.setItem('isLoggedIn', 'true');
                localStorage.setItem('loginTime',  Date.now().toString());
                window.location.replace('../');
            } catch (e) {
                let msg = '로그인에 실패했습니다.';
                if (e.code === 'auth/user-not-found' || e.code === 'auth/wrong-password' ||
                    e.code === 'auth/invalid-credential') {
                    msg = '이메일 또는 비밀번호가 올바르지 않습니다.';
                } else if (e.code === 'auth/too-many-requests') {
                    msg = '로그인 시도가 너무 많습니다. 잠시 후 다시 시도해주세요.';
                }
                err.textContent = msg;
                err.classList.add('show');
            } finally {
                btn.disabled  = false;
                btn.innerHTML = '로그인';
            }
        };

        // 엔터키 로그인 지원
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') handleLogin();
        });
    </script>
</body>
</html>
